    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinnoh Gen 4 Master Binder Tracker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #0f172a; color: #f8fafc; padding: 40px 15px; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; margin-bottom: 35px; max-width: 600px; }
        h1 { color: #38bdf8; font-size: 2.4rem; margin-bottom: 10px; }
        .dashboard-row { margin-top: 25px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .counter-banner, .clear-btn { display: inline-flex; align-items: center; justify-content: center; height: 44px; padding: 0 24px; font-size: 0.95rem; font-weight: 600; border-radius: 8px; box-sizing: border-box; }
        .counter-banner { background-color: #1e293b; color: #38bdf8; border: 1px solid #334155; }
        .clear-btn { background-color: #ef4444; color: #ffffff; border: 1px solid #dc2626; cursor: pointer; transition: background-color 0.2s ease; }
        .clear-btn:hover { background-color: #dc2626; }
        .binder-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1000px; width: 100%; background-color: #020617; border: 12px solid #334155; border-radius: 24px; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); }
        .card-pocket { background-color: #1e293b; border: 2px dashed #475569; border-radius: 14px; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; transition: all 0.3s ease; }
        .card-info { font-size: 0.85rem; font-weight: 600; color: #94a3b8; margin-bottom: 8px; text-align: center; }
        .card-image { width: 100%; height: auto; border-radius: 10px; filter: grayscale(100%) opacity(20%); transition: all 0.35s ease; }
        .card-pocket.owned { border-style: solid; border-color: #38bdf8; }
        .card-pocket.owned .card-image { filter: grayscale(0%) opacity(100%); transform: scale(1.02); }
        .checkbox-label { margin-top: 12px; cursor: pointer; }

        @media (max-width: 800px) { .binder-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .binder-grid { grid-template-columns: 1fr; } .dashboard-row { flex-direction: column; } }
    </style>
</head>
<body>

    <header>
        <h1>Sinnoh Master Binder</h1>
        <p>An automated layout tracker for Gen 4.</p>
        <div class="dashboard-row">
            <div class="counter-banner">Collected: <span id="collectionCount">0</span> / 107</div>
            <button onclick="fullSync()" class="clear-btn" style="background-color: #38bdf8; border: 1px solid #0284c7;">Full Sync</button>
            <button onclick="clearAllProgress()" class="clear-btn">Clear Progress</button>
        </div>
    </header>

    <div class="binder-grid" id="binderContainer"></div>

    <script>
        const pokemonData = [
            {"id": 387, "name": "Turtwig", "other": true, "image": "https://pkmncards.com/wp-content/uploads/mebsp_en_040_std.jpg"}, 
            {"id": 388, "name": "Grotle"}, {"id": 389, "name": "Torterra"},
            {"id": 390, "name": "Chimchar", "other": true, "image": "https://pkmncards.com/wp-content/uploads/mebsp_en_041_std.jpg"}, 
            {"id": 391, "name": "Monferno"}, {"id": 392, "name": "Infernape"},
            {"id": 393, "name": "Piplup", "other": true, "image": "https://pkmncards.com/wp-content/uploads/mebsp_en_042_std.jpg"}, 
            {"id": 394, "name": "Prinplup"}, {"id": 395, "name": "Empoleon"},
            {"id": 396, "name": "Starly"}, {"id": 397, "name": "Staravia"}, {"id": 398, "name": "Staraptor"},
            {"id": 399, "name": "Bidoof"}, {"id": 400, "name": "Bibarel"}, {"id": 401, "name": "Kricketot"},
            {"id": 402, "name": "Kricketune"}, {"id": 403, "name": "Shinx"}, {"id": 404, "name": "Luxio"},
            {"id": 405, "name": "Luxray"}, {"id": 406, "name": "Budew"}, {"id": 407, "name": "Roserade"},
            {"id": 408, "name": "Cranidos"}, {"id": 409, "name": "Rampardos"}, {"id": 410, "name": "Shieldon"},
            {"id": 411, "name": "Bastiodon"}, {"id": 412, "name": "Burmy"}, {"id": 413, "name": "Wormadam"},
            {"id": 414, "name": "Mothim"}, {"id": 415, "name": "Combee"}, {"id": 416, "name": "Vespiquen"},
            {"id": 417, "name": "Pachirisu"}, {"id": 418, "name": "Buizel"}, {"id": 419, "name": "Floatzel"},
            {"id": 420, "name": "Cherubi"}, {"id": 421, "name": "Cherrim"}, {"id": 422, "name": "Shellos"},
            {"id": 423, "name": "Gastrodon"}, {"id": 424, "name": "Ambipom"}, {"id": 425, "name": "Drifloon"},
            {"id": 426, "name": "Drifblim"}, {"id": 427, "name": "Buneary"}, {"id": 428, "name": "Lopunny"},
            {"id": 429, "name": "Mismagius"}, {"id": 430, "name": "Honchkrow"}, {"id": 431, "name": "Glameow"},
            {"id": 432, "name": "Purugly"}, {"id": 433, "name": "Chingling"}, {"id": 434, "name": "Stunky"},
            {"id": 435, "name": "Skuntank"}, {"id": 436, "name": "Bronzor"}, {"id": 437, "name": "Bronzong"},
            {"id": 438, "name": "Bonsly"}, {"id": 439, "name": "Mime Jr."}, {"id": 440, "name": "Happiny"},
            {"id": 441, "name": "Chatot"}, {"id": 442, "name": "Spiritomb"}, {"id": 443, "name": "Gible"},
            {"id": 444, "name": "Gabite"}, {"id": 445, "name": "Garchomp"}, {"id": 446, "name": "Munchlax"},
            {"id": 447, "name": "Riolu"}, {"id": 448, "name": "Lucario"}, {"id": 449, "name": "Hippopotas"},
            {"id": 450, "name": "Hippowdon"}, {"id": 451, "name": "Skorupi"}, {"id": 452, "name": "Drapion"},
            {"id": 453, "name": "Croagunk"}, {"id": 454, "name": "Toxicroak"}, {"id": 455, "name": "Carnivine"},
            {"id": 456, "name": "Finneon"}, {"id": 457, "name": "Lumineon"}, {"id": 458, "name": "Mantyke"},
            {"id": 459, "name": "Snover"}, {"id": 460, "name": "Abomasnow"}, {"id": 461, "name": "Weavile"},
            {"id": 462, "name": "Magnezone"}, {"id": 463, "name": "Lickilicky"}, {"id": 464, "name": "Rhyperior"},
            {"id": 465, "name": "Tangrowth"}, {"id": 466, "name": "Electivire"}, {"id": 467, "name": "Magmortar"},
            {"id": 468, "name": "Togekiss"}, {"id": 469, "name": "Yanmega"}, {"id": 470, "name": "Leafeon"},
            {"id": 471, "name": "Glaceon"}, {"id": 472, "name": "Gliscor"}, {"id": 473, "name": "Mamoswine"},
            {"id": 474, "name": "Porygon-Z"}, {"id": 475, "name": "Gallade"}, {"id": 476, "name": "Probopass"},
            {"id": 477, "name": "Dusknoir"}, {"id": 478, "name": "Froslass"}, {"id": 479, "name": "Rotom"},
            {"id": 480, "name": "Uxie"}, {"id": 481, "name": "Mesprit"}, {"id": 482, "name": "Azelf"},
            {"id": 483, "name": "Dialga"}, {"id": 484, "name": "Palkia"}, {"id": 485, "name": "Heatran"},
            {"id": 486, "name": "Regigigas"}, {"id": 487, "name": "Giratina"}, {"id": 488, "name": "Cresselia"},
            {"id": 489, "name": "Phione"}, {"id": 490, "name": "Manaphy"}, {"id": 491, "name": "Darkrai"},
            {"id": 492, "name": "Shaymin"}, {"id": 493, "name": "Arceus"}
        ];

        let savedCollection = JSON.parse(localStorage.getItem('sinnoh_binder_tracker')) || {};
        let cardImageCache = JSON.parse(localStorage.getItem('sinnoh_card_images')) || {};
        const container = document.getElementById('binderContainer');

        pokemonData.forEach(pkmn => {
            const isOwned = savedCollection[pkmn.id] === true;
            const pocket = document.createElement('div');
            pocket.className = isOwned ? 'card-pocket owned' : 'card-pocket';
            pocket.id = `pocket-${pkmn.id}`;
            const placeholder = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pkmn.id}.png`;

            pocket.innerHTML = `
                <div class="card-info">#${pkmn.id} - ${pkmn.name}</div>
                <img src="${placeholder}" class="card-image" id="img-${pkmn.id}">
                <label class="checkbox-label"><input type="checkbox" ${isOwned ? 'checked' : ''} onchange="toggleCard(${pkmn.id}, this)"> Owned</label>
            `;
            container.appendChild(pocket);

            const targetImage = document.getElementById(`img-${pkmn.id}`);

            if (cardImageCache[pkmn.id] && cardImageCache[pkmn.id].startsWith("http")) {
                targetImage.src = cardImageCache[pkmn.id];
            } else if (pkmn.other) {
                targetImage.src = pkmn.image;
                saveImageToCache(pkmn.id, pkmn.image);
            } else {
                fetch(`https://api.pokemontcg.io/v2/cards?q=nationalPokedexNumbers:${pkmn.id} (rarity:"Illustration Rare" OR rarity:"Special Illustration Rare" OR rarity:"Promo" OR rarity:"Rare Secret" OR rarity:"Rare Shiny" OR rarity:"Rare Holo LV.X" OR rarity:"Rare Prime" OR subtype:"VSTAR")`)
                .then(res => res.json())
                .then(data => {
                    if (data.data?.length > 0) {
                        const img = data.data[0].images.large;
                        targetImage.src = img;
                        saveImageToCache(pkmn.id, img);
                    } else {
                        fetch(`https://api.pokemontcg.io/v2/cards?q=nationalPokedexNumbers:${pkmn.id}`)
                        .then(res => res.json())
                        .then(fallbackData => {
                            if (fallbackData.data?.length > 0) {
                                const img = fallbackData.data[fallbackData.data.length - 1].images.large;
                                targetImage.src = img;
                                saveImageToCache(pkmn.id, img);
                            }
                        });
                    }
                });
            }
        });

        function saveImageToCache(id, url) { cardImageCache[id] = url; localStorage.setItem('sinnoh_card_images', JSON.stringify(cardImageCache)); }
        function toggleCard(id, cb) {
            const el = document.getElementById('pocket-' + id);
            cb.checked ? el.classList.add('owned') : el.classList.remove('owned');
            savedCollection[id] = cb.checked;
            localStorage.setItem('sinnoh_binder_tracker', JSON.stringify(savedCollection));
            updateMetrics();
        }
        function updateMetrics() { document.getElementById('collectionCount').innerText = Object.keys(savedCollection).filter(k => savedCollection[k]).length; }
        function fullSync() {
            if (confirm("This will clear all saved card images and re-fetch them from the servers. Proceed?")) {
                localStorage.removeItem('sinnoh_card_images');
                location.reload();
            }
        }
        function clearAllProgress() {
            if(confirm("Are you sure you want to reset your entire collection?")) {
                localStorage.clear();
                location.reload();
            }
        }
        updateMetrics();
    </script>
</body>
</html>
