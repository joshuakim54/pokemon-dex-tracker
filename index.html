<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinnoh Gen 4 Master Binder Tracker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #0f172a; /* Dark sleek background */
            color: #f8fafc;
            padding: 40px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            margin-bottom: 35px;
            max-width: 600px;
        }
        h1 {
            color: #38bdf8;
            font-size: 2.4rem;
            margin-bottom: 10px;
        }
        p.subtitle {
            color: #94a3b8;
            font-size: 1.05rem;
            line-height: 1.5;
        }
        .counter-banner {
            background-color: #1e293b;
            border: 1px solid #334155;
            padding: 10px 20px;
            border-radius: 30px;
            margin-top: 15px;
            display: inline-block;
            font-weight: 600;
            color: #38bdf8;
        }
        
        /* 3x3 Binder Layout Sheet */
        .binder-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 cards wide matching a classic binder sheet */
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            background-color: #020617; 
            border: 12px solid #334155;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .card-pocket {
            background-color: #1e293b;
            border: 2px dashed #475569;
            border-radius: 14px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-info {
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 8px;
            text-align: center;
        }
        .card-image {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            filter: grayscale(100%) opacity(20%); /* Faded until collected */
            transition: all 0.35s ease;
        }

        .checkbox-label {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            color: #cbd5e1;
            cursor: pointer;
            user-select: none;
        }
        .checkbox-label input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #38bdf8;
        }

        /* Active states */
        .card-pocket.owned {
            border-style: solid;
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }
        .card-pocket.owned .card-image {
            filter: grayscale(0%) opacity(100%); /* Full brilliant color */
            transform: scale(1.02);
        }
        .card-pocket.owned .card-info {
            color: #38bdf8;
        }

        /* Mobile Adjustments */
        @media (max-width: 800px) {
            .binder-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 500px) {
            .binder-grid { grid-template-columns: 1fr; }
        }
        .clear-btn {
            background-color: #ef4444; /* Crisp warning red */
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }
        
        .clear-btn:hover {
            background-color: #dc2626; /* Darker red on hover */
        }
        
        .clear-btn:active {
            transform: scale(0.95); /* Subtle press effect when clicked */
        }
    </style>
</head>
<body>

    <header>
        <h1>Sinnoh Master Binder</h1>
        <p class="subtitle">An automated 3x3 layout tracker managing all 107 native Generation 4 species.</p>
        <div style="margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 15px;">
        <div class="counter-banner" style="font-size: 1.2rem; font-weight: bold;">
            Collected: <span id="collectionCount">0</span> / 107
        </div>
        
        <!-- THE CLEAR Progress BUTTON -->
        <button onclick="clearAllProgress()" class="clear-btn">Clear Progress</button>
        </div>
    </header>

    <!-- The target wrapper for the loop output -->
    <div class="binder-grid" id="binderContainer"></div>

   <script>
    // 1. Your clean, effortless list of 107 Sinnoh entries
    const pokemonData = [
        {"id": 387, "name": "Turtwig"}, {"id": 388, "name": "Grotle"}, {"id": 389, "name": "Torterra"},
        {"id": 390, "name": "Chimchar"}, {"id": 391, "name": "Monferno"}, {"id": 392, "name": "Infernape"},
        {"id": 393, "name": "Piplup"}, {"id": 394, "name": "Prinplup"}, {"id": 395, "name": "Empoleon"},
        {"id": 396, "name": "Starly"}, {"id": 397, "name": "Staravia"}, {"id": 398, "name": "Staraptor"},
        {"id": 399, "name": "Bidoof"}, {"id": 400, "name": "Bibarel"}, {"id": 401, "name": "Kricketot"},
        {"id": 402, "name": "Kricketune"}, {"id": 403, "name": "Shinx"}, {"id": 404, "name": "Luxio"},
        {"id": 405, "name": "Luxray"}, {"id": 406, "name": "Budew"}, {"id": 407, "name": "Roserade"},
        {"id": 408, "name": "Cranidos"}, {"id": 409, "name": "Rampardos"}, {"id": 410, "name": "Shieldon"},
        {"id": 411, "name": "Bastiodon"}, {"id": 412, "name": "Burmy"}, {"id": 413, "name": "Wormadam"},
        {"id": 414, "name": "Mothim"}, {"id": 415, "name": "Combee"}, {"id": 416, "name": "Vespiquen"},
        {"id": 417, "name": "Pachirisu"}, {"id": 418, "name": "Buizel"}, {"id": 419, "name": "Floatzel"},
        {"id": 420, "name": "Cherubi"}, {"id": 421, "name": "Cherrim"}, {"id": 422, "name": "Shellos"},
        {"id": 423, "name": "Gastrodon"}, {"id": 424, "name": "Ambipom"}, {"id": 425, "name": "Drifloon"},
        {"id": 426, "name": "Drifblim"}, {"id": 427, "name": "Buneary"}, {"id": 428, "name": "Lopunny"},
        {"id": 429, "name": "Mismagius"}, {"id": 430, "name": "Honchkrow"}, {"id": 431, "name": "Glameow"},
        {"id": 432, "name": "Purugly"}, {"id": 433, "name": "Chingling"}, {"id": 434, "name": "Stunky"},
        {"id": 435, "name": "Skuntank"}, {"id": 436, "name": "Bronzor"}, {"id": 437, "name": "Bronzong"},
        {"id": 438, "name": "Bonsly"}, {"id": 439, "name": "Mime Jr."}, {"id": 440, "name": "Happiny"},
        {"id": 441, "name": "Chatot"}, {"id": 442, "name": "Spiritomb"}, {"id": 443, "name": "Gible"},
        {"id": 444, "name": "Gabite"}, {"id": 445, "name": "Garchomp"}, {"id": 446, "name": "Munchlax"},
        {"id": 447, "name": "Riolu"}, {"id": 448, "name": "Lucario"}, {"id": 449, "name": "Hippopotas"},
        {"id": 450, "name": "Hippowdon"}, {"id": 451, "name": "Skorupi"}, {"id": 452, "name": "Drapion"},
        {"id": 453, "name": "Croagunk"}, {"id": 454, "name": "Toxicroak"}, {"id": 455, "name": "Carnivine"},
        {"id": 456, "name": "Finneon"}, {"id": 457, "name": "Lumineon"}, {"id": 458, "name": "Mantyke"},
        {"id": 459, "name": "Snover"}, {"id": 460, "name": "Abomasnow"}, {"id": 461, "name": "Weavile"},
        {"id": 462, "name": "Magnezone"}, {"id": 463, "name": "Lickilicky"}, {"id": 464, "name": "Rhyperior"},
        {"id": 465, "name": "Tangrowth"}, {"id": 466, "name": "Electivire"}, {"id": 467, "name": "Magmortar"},
        {"id": 468, "name": "Togekiss"}, {"id": 469, "name": "Yanmega"}, {"id": 470, "name": "Leafeon"},
        {"id": 471, "name": "Glaceon"}, {"id": 472, "name": "Gliscor"}, {"id": 473, "name": "Mamoswine"},
        {"id": 474, "name": "Porygon-Z"}, {"id": 475, "name": "Gallade"}, {"id": 476, "name": "Probopass"},
        {"id": 477, "name": "Dusknoir"}, {"id": 478, "name": "Froslass"}, {"id": 479, "name": "Rotom"},
        {"id": 480, "name": "Uxie"}, {"id": 481, "name": "Mesprit"}, {"id": 482, "name": "Azelf"},
        {"id": 483, "name": "Dialga"}, {"id": 484, "name": "Palkia"}, {"id": 485, "name": "Heatran"},
        {"id": 486, "name": "Regigigas"}, {"id": 487, "name": "Giratina"}, {"id": 488, "name": "Cresselia"},
        {"id": 489, "name": "Phione"}, {"id": 490, "name": "Manaphy"}, {"id": 491, "name": "Darkrai"},
        {"id": 492, "name": "Shaymin"}, {"id": 493, "name": "Arceus"}
    ];

    let savedCollection = JSON.parse(localStorage.getItem('sinnoh_binder_tracker')) || {};
    const container = document.getElementById('binderContainer');

    // 2. Clear out container completely before rendering to prevent duplicates
    container.innerHTML = '';

    // 3. Dynamic Automated Image Fetcher Loop
    pokemonData.forEach(pkmn => {
        const isOwned = savedCollection[pkmn.id] === true;

        const pocket = document.createElement('div');
        pocket.className = isOwned ? 'card-pocket owned' : 'card-pocket';
        pocket.id = `pocket-${pkmn.id}`;

        // AUTOMATED RESOLUTION: This endpoint automatically maps the card text, full frame artwork windows, 
        // and modern layouts straight via the exact Pokédex ID. No manual set values needed!
        const cardImageUrl = `https://api.pokemontcg.io/v2/cards?q=nationalPokedexNumbers:${pkmn.id}`;
        
        // Let's tap into the crisp, lightning-fast open database directly to keep load times instant:
        const cleanCardArt = `https://images.pokemontcg.io/sv4pt5/${pkmn.id - 240}.png`; 

        // Let's utilize a foolproof open-source repository that references the global card image maps cleanly:
        pocket.innerHTML = `
            <div class="card-info">#${pkmn.id} - ${pkmn.name}</div>
            <img src="https://assets.tcgdex.net/en/unreleased/ex1/high.webp" alt="${pkmn.name}" class="card-image" id="img-${pkmn.id}" loading="lazy">
            <label class="checkbox-label">
                <input type="checkbox" ${isOwned ? 'checked' : ''} onchange="toggleCard(${pkmn.id}, this)">
                Owned
            </label>
        `;
        container.appendChild(pocket);

        // Fetch the genuine modern card print live from the official API server index without relying on manual formulas!
        fetch(`https://api.pokemontcg.io/v2/cards?q=nationalPokedexNumbers:${pkmn.id}&pageSize=1`)
            .then(res => res.json())
            .then(data => {
                if(data.data && data.data.length > 0) {
                    // Instantly update the card placeholder src to the high resolution modern print file!
                    document.getElementById(`img-${pkmn.id}`).src = data.data[0].images.large;
                }
            })
            .catch(err => console.error("Error loading card asset:", err));
    });

    function toggleCard(id, checkbox) {
        const pocketElement = document.getElementById(`pocket-${id}`);
        if (checkbox.checked) {
            pocketElement.classList.add('owned');
            savedCollection[id] = true;
        } else {
            pocketElement.classList.remove('owned');
            delete savedCollection[id];
        }
        localStorage.setItem('sinnoh_binder_tracker', JSON.stringify(savedCollection));
        updateMetrics();
    }

    function clearAllProgress() {
        if (confirm("Are you sure you want to reset your binder? This will uncheck all 107 cards!")) {
            savedCollection = {};
            localStorage.removeItem('sinnoh_binder_tracker');
            container.querySelectorAll('input[type="checkbox"]').forEach(box => box.checked = false);
            container.querySelectorAll('.card-pocket').forEach(pocket => pocket.classList.remove('owned'));
            updateMetrics();
        }
    }

    function updateMetrics() {
        document.getElementById('collectionCount').innerText = Object.keys(savedCollection).length;
    }
    updateMetrics();
</script>
</body>
</html>
